server.port=22001
spring.application.name=aigo

# ─────────────────────────────────────────────
#  KataGo 설정 (Homebrew 설치 경로)
#  실행파일 : /opt/homebrew/bin/katago
#  모델파일 : kata1-b18c384nbt (최강 모델, 93MB)
#  설정파일 : gtp_example.cfg
# ─────────────────────────────────────────────
katago.executable=/opt/homebrew/bin/katago
katago.model=/opt/homebrew/share/katago/kata1-b18c384nbt-s9996604416-d4316597426.bin.gz
katago.config=/opt/homebrew/share/katago/configs/gtp_example.cfg

# ─────────────────────────────────────────────
#  게임 세션 캐시 (DoS 방지)
# ─────────────────────────────────────────────
game.session.max-active=5000
game.session.ttl-active-minutes=60
game.session.ttl-ended-minutes=5

# ─────────────────────────────────────────────
#  KataGo 엔진 접근 제어 (DoS 방지)
#   - lock-timeout-ms: KataGo 락 획득 대기 한도. 초과 시 503 + Retry-After.
#   - hint-cooldown-ms: 게임 단위 /hints 쿨다운. 재호출 시 429 + Retry-After.
# ─────────────────────────────────────────────
game.engine.lock-timeout-ms=3000
game.engine.hint-cooldown-ms=5000

# ─────────────────────────────────────────────
#  레이트 리밋 (/api/game/new, IP 단위)
# ─────────────────────────────────────────────
game.ratelimit.enabled=true
game.ratelimit.new-game-per-minute=10
game.ratelimit.bucket-capacity=10
game.ratelimit.max-tracked-ips=100000

# ─────────────────────────────────────────────
#  HTTP 요청 크기 제한 (기본값 명시)
# ─────────────────────────────────────────────
server.tomcat.max-http-form-post-size=64KB
spring.servlet.multipart.max-request-size=1MB
spring.servlet.multipart.max-file-size=1MB

# Logging
logging.level.com.aigo=INFO
